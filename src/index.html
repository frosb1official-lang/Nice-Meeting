<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Nice Meeting</title>
        <link rel="shortcut icon" href="./images/cover.png" type="image/x-icon">
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Pacifico&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="niceMeeting.css" />
        <script type="module" src="./js/Questions.js" async="false"></script>
        <script
            type="module"
            src="./js/currentQuestion.js"
            async="false"
        ></script>
        <script src="./js/noBtnMove.js" async="false"></script>
    </head>
    <body>
        <div class="container" id="questionScreen">
            <div class="container-wrapper">
                <div class="img-wrapper content-wrapper">
                    <img id="questionGif" src="" alt="gif" />
                </div>

                <div class="text-wrapper content-wrapper">
                    <p class="text-question" id="qText"></p>
                </div>

                <div class="btns-wrapper content-wrapper">
                    <div class="btn-block">
                        <button class="btn" type="button" id="yesBtn">Да</button>
                    </div>
                    <div class="btn-block">
                        <button class="btn btn-wrong" type="button" id="noBtn">
                        Нет
                    </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="final-screen container hidden" id="finalScreen">
            <div class="container-wrapper">
                <div class="img-wrapper content-wrapper">
                    <img
                        src="./images/mochi-final-screen.gif"
                        alt="img"
                        id="questionGif"
                    />
                </div>

                <div class="text-wrapper content-wrapper">
                    <p class="text-question" id="qText">
                        Супер, я в полной боевой готовности к встрече с тобой!
                    </p>
                </div>
            </div>
        </div>
    </body>
</html>
